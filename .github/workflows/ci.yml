name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: check · clippy · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: fraise
          POSTGRES_PASSWORD: fraise
          POSTGRES_DB: fraise_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: cargo check
        run: cargo check --workspace
        env:
          DATABASE_URL: postgres://fraise:fraise@localhost:5432/fraise_test

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          DATABASE_URL: postgres://fraise:fraise@localhost:5432/fraise_test

      - name: cargo test (server)
        working-directory: server
        run: cargo test
        env:
          DATABASE_URL: postgres://fraise:fraise@localhost:5432/fraise_test
          REDIS_URL: redis://localhost:6379

      - name: cargo test (domain)
        working-directory: domain
        run: cargo test
        env:
          DATABASE_URL: postgres://fraise:fraise@localhost:5432/fraise_test
